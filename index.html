<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- FIX: Added maximum-scale to prevent unwanted zooming on iPhones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cute Pig QR Code (Responsive)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #1a1a2e;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #30183b 0%, #1a1a2e 100%);
            overflow-x: hidden; /* Prevents horizontal scroll on small devices */
        }

        .font-fancy {
            font-family: 'Pacifico', cursive;
        }

        /* 3D Card Container - FULLY RESPONSIVE */
        .card-container {
            position: relative;
            /* Replaced fixed width with fluid width */
            width: 90vw; 
            max-width: 380px;
            /* Flexible height */
            min-height: 480px;
            height: 75vh;
            max-height: 520px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(255, 255, 255, 0.2), 
                        0 0 40px rgba(236, 72, 153, 0.4);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        /* Pure CSS 3D Pink Background */
        .bg-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 40%, #be185d 100%);
            z-index: 0;
        }

        /* Ambient glowing orb to give 3D depth */
        .ambient-glow {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
            z-index: 1;
        }

        /* Content Wrapper */
        .content {
            position: relative;
            z-index: 4;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Better distribution */
            padding: 25px 15px;
            text-align: center;
        }

        /* Glassmorphism QR Container */
        .qr-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 16px; /* Slightly reduced padding for mobile */
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px 0 rgba(131, 24, 67, 0.3), inset 0 2px 10px rgba(255, 255, 255, 0.4);
            margin-top: auto;
            margin-bottom: auto;
            position: relative;
            transform: translateZ(20px);
            width: fit-content;
        }

        /* Floating Animation */
        .floating {
            animation: float 4s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Decorative Sparkles */
        .sparkle {
            position: absolute;
            width: clamp(10px, 3vw, 15px); /* Responsive size */
            height: clamp(10px, 3vw, 15px);
            background: radial-gradient(circle, #fff 20%, transparent 70%);
            border-radius: 50%;
            opacity: 0.9;
            z-index: 2;
            animation: twinkle 2s infinite alternate;
            box-shadow: 0 0 10px #fff;
        }

        @keyframes twinkle {
            0% { transform: scale(0.6); opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 1; }
        }

        /* 3D Pig Image styling - RESPONSIVE CLAMP */
        .pig-img {
            position: absolute;
            z-index: 5;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }
        
        .pig-top {
            top: -5%;
            right: -8%;
            /* Scales down on small screens, maxes out at 140px */
            width: clamp(100px, 35%, 140px); 
            transform: rotate(15deg);
        }
        
        .pig-bottom {
            bottom: 2%;
            left: -8%;
            width: clamp(90px, 30%, 120px);
            transform: rotate(-10deg);
        }

    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Container that will be screenshotted -->
    <div id="capture-area" class="card-container floating mt-4 sm:mt-8">
        <!-- 3D Pink Background -->
        <div class="bg-3d"></div>
        <div class="ambient-glow"></div>

        <!-- Responsive 3D Cute Pigs -->
        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Pig%20Face.png" 
             alt="3D Cute Pig" 
             class="pig-img pig-top"
             crossorigin="anonymous">
             
        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Pig.png" 
             alt="3D Full Pig" 
             class="pig-img pig-bottom"
             crossorigin="anonymous">

        <div class="content">
            <div>
                <!-- Responsive text sizing -->
                <h1 class="font-fancy text-3xl sm:text-4xl text-white drop-shadow-[0_4px_6px_rgba(131,24,67,0.8)] mt-3 mb-1 tracking-wide">Hey Gorgeous!</h1>
                <p class="text-pink-50 font-bold text-base sm:text-lg drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] tracking-wider">A special surprise awaits...</p>
            </div>

            <!-- The Scannable Area -->
            <div class="qr-glass z-10 flex flex-col items-center my-4">
                <!-- Adjusted padding and size for iPhones -->
                <div id="qrcode" class="bg-white p-2.5 rounded-xl shadow-[inset_0_2px_8px_rgba(0,0,0,0.1)] flex justify-center items-center"></div>
                <p class="text-white text-xs sm:text-sm font-bold mt-3 tracking-widest uppercase opacity-90 drop-shadow-md">Scan Me</p>
            </div>

            <p class="font-fancy text-xl sm:text-2xl text-pink-100 mb-2 drop-shadow-[0_3px_5px_rgba(131,24,67,0.6)]">Yours forever ❤️</p>
            
            <!-- Sparkles -->
            <div class="sparkle" style="top: 15%; left: 8%;"></div>
            <div class="sparkle" style="top: 25%; right: 18%; animation-delay: 0.5s;"></div>
            <div class="sparkle" style="bottom: 18%; right: 8%; animation-delay: 1s;"></div>
        </div>
    </div>

    <!-- Download Button (Responsive padding & text) -->
    <button id="download-btn" class="mt-8 mb-4 bg-gradient-to-r from-fuchsia-500 to-pink-500 hover:from-fuchsia-600 hover:to-pink-600 text-white font-bold py-3 px-6 sm:py-4 sm:px-8 rounded-full shadow-[0_0_25px_rgba(236,72,153,0.5)] transition-all transform hover:scale-105 active:scale-95 text-base sm:text-lg flex items-center gap-2 sm:gap-3 border-2 border-pink-300 w-[90%] sm:w-auto justify-center max-w-[320px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        <span>Download 3D Card</span>
    </button>

    <script>
        // 1. Generate the working QR Code
        const qrLink = "https://cheshta-site.vercel.app/";
        const qrContainer = document.getElementById("qrcode");
        
        // Dynamically size the QR code a bit smaller to guarantee it fits on small iPhones
        const qrSize = window.innerWidth < 360 ? 160 : 180;
        
        new QRCode(qrContainer, {
            text: qrLink,
            width: qrSize,
            height: qrSize,
            colorDark : "#831843", // Deep dark pink/magenta
            colorLight : "#ffffff", 
            correctLevel : QRCode.CorrectLevel.H 
        });

        // FIX: Extract canvas to pure image for html2canvas (Important for iOS Safari)
        setTimeout(() => {
            const canvas = qrContainer.querySelector("canvas");
            const img = qrContainer.querySelector("img");
            if (canvas && img) {
                img.src = canvas.toDataURL("image/png");
                img.style.display = "block";
                img.style.margin = "0 auto";
                img.style.borderRadius = "8px";
                canvas.remove(); 
            }
        }, 500);

        // 2. Download functionality
        document.getElementById('download-btn').addEventListener('click', function() {
            const captureArea = document.getElementById('capture-area');
            
            // Temporarily stop animation for a clean screenshot
            captureArea.classList.remove('floating');
            
            // Change button text
            const btn = document.getElementById('download-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Saving...`;

            // Adding a small delay to ensure rendering is ready
            setTimeout(() => {
                html2canvas(captureArea, { 
                    backgroundColor: null, 
                    scale: window.devicePixelRatio > 1 ? window.devicePixelRatio : 3, // Adapt scale for retina displays (iPhone)
                    useCORS: true, 
                    allowTaint: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = '3D_Cute_Pig_QR.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    // Restore
                    captureArea.classList.add('floating');
                    btn.innerHTML = originalHTML;
                }).catch(err => {
                    console.error("Capture Error: ", err);
                    alert("Opps! Download nahi ho paaya. Ek baar page refresh karke try kar.");
                    captureArea.classList.add('floating');
                    btn.innerHTML = originalHTML;
                });
            }, 500);
        });
    </script>
</body>
</html>
